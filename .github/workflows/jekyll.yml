name: Deploy Fixed Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-fixed"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate project collection files from projects/
        run: |
          # Do NOT overwrite repository _config.yml or Gemfile here.
          rm -rf _projects
          mkdir -p _projects

          if [ -d "projects" ]; then
            for project_dir in projects/*; do
              if [ -d "$project_dir" ] && [ -f "$project_dir/index.md" ]; then
                project_name=$(basename "$project_dir")
                output_file="_projects/${project_name}.md"

                awk '
                  BEGIN { front=0; done=0 }
                  NR==1 && $0=="---" { print; front=1; next }
                  front==1 && $0=="---" && done==0 {
                    print "featured_image: \"featured.jpg\""
                    print "---"
                    front=0
                    done=1
                    next
                  }
                  { print }
                ' "$project_dir/index.md" > "$output_file"
              fi
            done
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.3'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
